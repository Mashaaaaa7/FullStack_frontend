#Checkout — загружает код репозитория в Github actions, чтобы шаги (установка зависимостей, тесты, сборка)
#работали с актуальным кодом.
#Run Ruff — запускает линтер Ruff для проверки кода на Python: стиль, потенциальные ошибки
#Это автоматическая проверка качества перед тестами и сборкой.

name: Frontend CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  frontend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm run test -- --coverage

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: [frontend-lint-test]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:latest